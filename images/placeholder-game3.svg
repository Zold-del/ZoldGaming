<!-- Pong Game Thumbnail SVG -->
<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#000000" />
  
  <!-- Court lines -->
  <line x1="150" y1="10" x2="150" y2="190" stroke="#444444" stroke-width="2" stroke-dasharray="5,5" />
  <circle cx="150" cy="100" r="30" fill="none" stroke="#444444" stroke-width="2" />
  
  <!-- Paddles -->
  <rect x="20" y="70" width="10" height="60" fill="#ffffff" rx="2" />
  <rect x="270" y="60" width="10" height="60" fill="#ffffff" rx="2" />
  
  <!-- Ball -->
  <circle cx="180" cy="110" r="8" fill="#ffffff" />
  
  <!-- Score -->
  <text x="120" y="40" font-family="'Press Start 2P', monospace" font-size="24" fill="#ffffff">3</text>
  <text x="170" y="40" font-family="'Press Start 2P', monospace" font-size="24" fill="#ffffff">2</text>
  
  <!-- Neon glow effects -->
  <rect x="20" y="70" width="10" height="60" fill="none" stroke="#ff00ff" stroke-width="3" filter="blur(5px)" opacity="0.6" rx="2" />
  <rect x="270" y="60" width="10" height="60" fill="none" stroke="#00ffff" stroke-width="3" filter="blur(5px)" opacity="0.6" rx="2" />
  <circle cx="180" cy="110" r="8" fill="none" stroke="#ffffff" stroke-width="3" filter="blur(5px)" opacity="0.6" />
  
  <!-- Text -->
  <text x="150" y="180" font-family="'Press Start 2P', monospace" font-size="12" fill="#ffffff" text-anchor="middle">PONG ARCADE</text>
</svg>

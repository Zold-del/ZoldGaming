<!-- Tetris Game Thumbnail SVG -->
<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#000000" />
  
  <!-- Grid -->
  <g stroke="#222222" stroke-width="1">
    <path d="M 60 0 L 60 200" />
    <path d="M 80 0 L 80 200" />
    <path d="M 100 0 L 100 200" />
    <path d="M 120 0 L 120 200" />
    <path d="M 140 0 L 140 200" />
    <path d="M 160 0 L 160 200" />
    <path d="M 180 0 L 180 200" />
    <path d="M 200 0 L 200 200" />
    <path d="M 220 0 L 220 200" />
    <path d="M 240 0 L 240 200" />
    
    <path d="M 60 20 L 240 20" />
    <path d="M 60 40 L 240 40" />
    <path d="M 60 60 L 240 60" />
    <path d="M 60 80 L 240 80" />
    <path d="M 60 100 L 240 100" />
    <path d="M 60 120 L 240 120" />
    <path d="M 60 140 L 240 140" />
    <path d="M 60 160 L 240 160" />
    <path d="M 60 180 L 240 180" />
  </g>
  
  <!-- Tetris pieces -->
  <!-- I piece -->
  <rect x="100" y="40" width="20" height="20" fill="#00ffff" stroke="#008888" />
  <rect x="120" y="40" width="20" height="20" fill="#00ffff" stroke="#008888" />
  <rect x="140" y="40" width="20" height="20" fill="#00ffff" stroke="#008888" />
  <rect x="160" y="40" width="20" height="20" fill="#00ffff" stroke="#008888" />
  
  <!-- L piece -->
  <rect x="180" y="60" width="20" height="20" fill="#ff8800" stroke="#884400" />
  <rect x="180" y="80" width="20" height="20" fill="#ff8800" stroke="#884400" />
  <rect x="180" y="100" width="20" height="20" fill="#ff8800" stroke="#884400" />
  <rect x="200" y="100" width="20" height="20" fill="#ff8800" stroke="#884400" />
  
  <!-- T piece -->
  <rect x="80" y="120" width="20" height="20" fill="#ff00ff" stroke="#880088" />
  <rect x="100" y="120" width="20" height="20" fill="#ff00ff" stroke="#880088" />
  <rect x="120" y="120" width="20" height="20" fill="#ff00ff" stroke="#880088" />
  <rect x="100" y="140" width="20" height="20" fill="#ff00ff" stroke="#880088" />
  
  <!-- Square piece -->
  <rect x="140" y="140" width="20" height="20" fill="#ffff00" stroke="#888800" />
  <rect x="160" y="140" width="20" height="20" fill="#ffff00" stroke="#888800" />
  <rect x="140" y="160" width="20" height="20" fill="#ffff00" stroke="#888800" />
  <rect x="160" y="160" width="20" height="20" fill="#ffff00" stroke="#888800" />
  
  <!-- Neon glow effects -->
  <rect x="100" y="40" width="80" height="20" fill="none" stroke="#00ffff" stroke-width="2" filter="blur(4px)" opacity="0.5" />
  <rect x="180" y="60" width="20" height="60" fill="none" stroke="#ff8800" stroke-width="2" filter="blur(4px)" opacity="0.5" />
  <rect x="80" y="120" width="60" height="20" fill="none" stroke="#ff00ff" stroke-width="2" filter="blur(4px)" opacity="0.5" />
  <rect x="140" y="140" width="40" height="40" fill="none" stroke="#ffff00" stroke-width="2" filter="blur(4px)" opacity="0.5" />
  
  <!-- Text -->
  <text x="150" y="190" font-family="'Press Start 2P', monospace" font-size="12" fill="#00ffff" text-anchor="middle">TETRIS NEON</text>
</svg>

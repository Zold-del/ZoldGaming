<!-- Snake Game Thumbnail SVG -->
<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#000000" />
  
  <!-- Grid -->
  <g stroke="#222222" stroke-width="1">
    <path d="M 0 20 L 300 20" />
    <path d="M 0 40 L 300 40" />
    <path d="M 0 60 L 300 60" />
    <path d="M 0 80 L 300 80" />
    <path d="M 0 100 L 300 100" />
    <path d="M 0 120 L 300 120" />
    <path d="M 0 140 L 300 140" />
    <path d="M 0 160 L 300 160" />
    <path d="M 0 180 L 300 180" />
    
    <path d="M 20 0 L 20 200" />
    <path d="M 40 0 L 40 200" />
    <path d="M 60 0 L 60 200" />
    <path d="M 80 0 L 80 200" />
    <path d="M 100 0 L 100 200" />
    <path d="M 120 0 L 120 200" />
    <path d="M 140 0 L 140 200" />
    <path d="M 160 0 L 160 200" />
    <path d="M 180 0 L 180 200" />
    <path d="M 200 0 L 200 200" />
    <path d="M 220 0 L 220 200" />
    <path d="M 240 0 L 240 200" />
    <path d="M 260 0 L 260 200" />
    <path d="M 280 0 L 280 200" />
  </g>
  
  <!-- Snake body -->
  <rect x="120" y="100" width="20" height="20" fill="#00ff00" />
  <rect x="100" y="100" width="20" height="20" fill="#00ff00" />
  <rect x="80" y="100" width="20" height="20" fill="#00ff00" />
  <rect x="60" y="100" width="20" height="20" fill="#00ff00" />
  <rect x="60" y="80" width="20" height="20" fill="#00ff00" />
  <rect x="60" y="60" width="20" height="20" fill="#00ff00" />
  <rect x="80" y="60" width="20" height="20" fill="#00ff00" />
  
  <!-- Snake head -->
  <rect x="100" y="60" width="20" height="20" fill="#00cc00" />
  <circle cx="105" cy="65" r="3" fill="white" />
  <circle cx="115" cy="65" r="3" fill="white" />
  
  <!-- Food -->
  <rect x="180" y="120" width="20" height="20" fill="#ff0000" />
  
  <!-- Text -->
  <text x="150" y="190" font-family="'Press Start 2P', monospace" font-size="12" fill="#ff00ff" text-anchor="middle">SNAKE</text>
</svg>

<!-- ZoldGaming Preview Image SVG -->
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a1a" />
  
  <!-- Grid pattern background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a5a" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Logo -->
  <text x="600" y="200" font-family="'Press Start 2P', monospace" font-size="70" fill="#ff00ff" text-anchor="middle">ZoldGaming</text>
  <rect x="598" y="210" width="4" height="20" fill="#ff00ff">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
  </rect>
  
  <!-- Tagline -->
  <text x="600" y="280" font-family="'Press Start 2P', monospace" font-size="30" fill="#00ffff" text-anchor="middle">Plateforme de mini-jeux rétro</text>
  
  <!-- Game icons -->
  <g transform="translate(350, 350)">
    <!-- Snake icon -->
    <rect x="0" y="0" width="100" height="100" fill="#000000" stroke="#00ff00" stroke-width="4" />
    <rect x="20" y="50" width="20" height="20" fill="#00ff00" />
    <rect x="40" y="50" width="20" height="20" fill="#00ff00" />
    <rect x="60" y="50" width="20" height="20" fill="#00ff00" />
    <rect x="60" y="30" width="20" height="20" fill="#00ff00" />
    <circle cx="70" cy="40" r="5" fill="#ffffff" />
  </g>
  
  <g transform="translate(550, 350)">
    <!-- Tetris icon -->
    <rect x="0" y="0" width="100" height="100" fill="#000000" stroke="#ff00ff" stroke-width="4" />
    <rect x="20" y="20" width="20" height="20" fill="#00ffff" />
    <rect x="40" y="20" width="20" height="20" fill="#00ffff" />
    <rect x="60" y="20" width="20" height="20" fill="#00ffff" />
    <rect x="20" y="40" width="20" height="20" fill="#ffff00" />
    <rect x="40" y="40" width="20" height="20" fill="#ffff00" />
    <rect x="20" y="60" width="20" height="20" fill="#ff0000" />
    <rect x="40" y="60" width="20" height="20" fill="#ff0000" />
    <rect x="60" y="60" width="20" height="20" fill="#ff0000" />
  </g>
  
  <g transform="translate(750, 350)">
    <!-- Pong icon -->
    <rect x="0" y="0" width="100" height="100" fill="#000000" stroke="#00ffff" stroke-width="4" />
    <rect x="10" y="30" width="10" height="40" fill="#ffffff" />
    <rect x="80" y="40" width="10" height="40" fill="#ffffff" />
    <circle cx="50" cy="50" r="10" fill="#ffffff" />
    <line x1="50" y1="0" x2="50" y2="100" stroke="#333333" stroke-width="2" stroke-dasharray="5,5" />
  </g>
  
  <!-- Call to action -->
  <text x="600" y="520" font-family="'Press Start 2P', monospace" font-size="25" fill="#ffffff" text-anchor="middle">Jouez maintenant gratuitement !</text>
  
  <!-- Website URL -->
  <text x="600" y="580" font-family="'Press Start 2P', monospace" font-size="20" fill="#aaaaaa" text-anchor="middle">www.github.io/zoldgaming</text>
</svg>
